<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GermanFlash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>GermanFlash</h1>
        <p id="subtitle">Small lessons. No chaos.</p>
      </div>
      <button id="homeBtn" class="small-btn hidden">Home</button>
    </header>

    <section id="homeScreen" class="screen active">
      <section id="continuePanel" class="hero-card hidden">
        <span class="eyebrow">Continue</span>
        <h2 id="continueTitle">Course</h2>
        <p id="continueMeta">Pick up where you left off.</p>
        <button id="continueBtn">Continue</button>
      </section>

      <section class="launcher-grid">
        <button id="startTodayBtn" class="launcher-card primary">
          <span>Start Today</span>
          <small>Recommended lesson</small>
        </button>

        <button id="reviewMistakesBtn" class="launcher-card hidden">
          <span>Review Mistakes</span>
          <small id="reviewMistakesMeta">0 cards</small>
        </button>

        <button id="browseCoursesBtn" class="launcher-card">
          <span>Browse Courses</span>
          <small>Choose a specific deck</small>
        </button>

        <button id="resetProgressBtn" class="launcher-card quiet">
          <span>Reset Progress</span>
          <small>Clear this device</small>
        </button>
      </section>
    </section>

    <section id="browseScreen" class="screen">
      <button id="backFromBrowseBtn" class="text-btn">← Home</button>

      <section class="section-block">
        <div class="section-heading">
          <h2>Categories</h2>
        </div>
        <div id="groupChips" class="chip-row"></div>
      </section>

      <section class="section-block">
        <div class="section-heading">
          <h2 id="courseGroupTitle">All Courses</h2>
          <span id="courseCount"></span>
        </div>
        <div id="courseList" class="compact-list"></div>
      </section>
    </section>

    <section id="courseScreen" class="screen">
      <button id="backToCoursesBtn" class="text-btn">← Courses</button>

      <div class="course-detail-card">
        <span id="courseLevel" class="pill">A1</span>
        <h2 id="courseTitle"></h2>
        <p id="courseDescription"></p>
        <p id="courseMeta"></p>
      </div>

      <div class="mode-grid">
        <button data-mode="de-en">German → English</button>
        <button data-mode="en-de">English → German</button>
        <button data-mode="article">Article Quiz</button>
      </div>
    </section>

    <section id="practiceScreen" class="screen">
      <div class="progress-row">
        <span id="cardCounter">1 / 1</span>
        <span id="scoreCounter">Known 0 · Review 0</span>
      </div>

      <article id="flashcard" class="flashcard">
        <div class="card-inner">
          <div class="card-face card-front">
            <p id="modeLabel" class="mode-label"></p>
            <div id="cardQuestion" class="card-question">Loading...</div>
            <p class="tap-hint">Tap to flip</p>
          </div>

          <div class="card-face card-back">
            <p class="mode-label">Answer</p>
            <div id="cardAnswer" class="card-answer"></div>
            <p class="tap-hint">Added to review</p>
          </div>
        </div>
      </article>

      <div class="secondary-actions">
        <button id="speakBtn">Speak</button>
        <button id="shuffleBtn">Shuffle</button>
      </div>
    </section>

    <section id="completeScreen" class="screen">
      <div class="complete-card">
        <span class="eyebrow">Finished</span>
        <h2>Well done.</h2>
        <p id="completeMeta">You finished the deck.</p>

        <div class="complete-actions">
          <button id="repeatBtn">Repeat</button>
          <button id="continueNextBtn">Continue</button>
          <button id="reviewSessionBtn" class="danger">Review</button>
        </div>
      </div>
    </section>

    <nav id="bottomBar" class="bottom-bar hidden">
      <button id="flipBtn">Flip</button>
      <button id="knowBtn" class="success">Know</button>
    </nav>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
