<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GermanFlash</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <h1>GermanFlash</h1>
        <p>Learn German one clean card at a time.</p>
      </div>
      <button id="resetProgressBtn" class="ghost-button">Reset Progress</button>
    </header>

    <section class="panel">
      <label for="courseSelect">Course</label>
      <select id="courseSelect"></select>

      <label for="modeSelect">Mode</label>
      <select id="modeSelect">
        <option value="de-en">German → English</option>
        <option value="en-de">English → German</option>
        <option value="article">Article Quiz</option>
      </select>
    </section>

    <section class="stats">
      <span id="cardCounter">Card 0 / 0</span>
      <span id="scoreCounter">Known: 0 | Review: 0</span>
    </section>

    <section class="card-area">
      <button id="prevBtn" class="nav-button">←</button>

      <article id="flashcard" class="flashcard">
        <div id="cardQuestion" class="card-question">Loading...</div>
        <div id="cardAnswer" class="card-answer hidden"></div>
      </article>

      <button id="nextBtn" class="nav-button">→</button>
    </section>

    <section class="actions">
      <button id="flipBtn">Flip</button>
      <button id="speakBtn">Speak</button>
      <button id="knowBtn" class="success">Know</button>
      <button id="dontKnowBtn" class="danger">Review</button>
      <button id="shuffleBtn">Shuffle</button>
    </section>

    <section class="review-panel">
      <h2>Review pile</h2>
      <ul id="reviewList"></ul>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
